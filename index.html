<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0b">
<title>Client Intake — Rumor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --bg: #0b0b0b;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(45,108,223,0.45);
    --text: #edeae3;
    --muted: rgba(237,234,227,0.42);
    --accent: #2D6CDF;
    --accent-glow: rgba(45,108,223,0.16);
    --accent-hover: #3d7af0;
    --error: #e05252;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    height: 100%;
    height: -webkit-fill-available;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* Safe area for notched devices */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* ── Progress Bar ─────────────────────────────── */
  #progress-track {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: rgba(255,255,255,0.06);
    z-index: 300;
  }
  #progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
    box-shadow: 0 0 8px rgba(45,108,223,0.55);
  }

  /* ── Fixed Logo (question screens) ───────────── */
  #fixed-logo {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: none;
    opacity: 0.55;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  #fixed-logo svg {
    width: 80px;
    height: auto;
  }
  #fixed-logo.visible { display: block; }

  /* ── Back Button ──────────────────────────────── */
  #back-btn {
    position: fixed;
    top: 14px; left: 14px;
    z-index: 200;
    display: none;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 8px 10px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    /* Minimum touch target */
    min-height: 44px;
    min-width: 44px;
  }
  #back-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  #back-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── Counter ──────────────────────────────────── */
  #q-counter {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 200;
    display: none;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.1em;
    line-height: 44px;
  }

  /* ── Viewport ─────────────────────────────────── */
  #viewport {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ── Screen ───────────────────────────────────── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    width: 100%;
    padding: 80px 28px 40px;
    opacity: 0;
    transform: translateY(28px);
    pointer-events: none;
    /* Allow scroll on small screens */
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }

  .screen-inner {
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .screen.enter {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
    transition: opacity 0.5s cubic-bezier(0.4,0,0.2,1), transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .screen.exit-up {
    opacity: 0;
    transform: translateY(-28px);
    pointer-events: none;
    transition: opacity 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .screen.exit-down {
    opacity: 0;
    transform: translateY(28px);
    pointer-events: none;
    transition: opacity 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Welcome ──────────────────────────────────── */
  .welcome-logo {
    margin-bottom: 48px;
  }
  .welcome-logo svg {
    width: 120px;
    height: auto;
  }
  .welcome-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(38px, 7vw, 72px);
    font-weight: 400;
    line-height: 1.08;
    color: var(--text);
    margin-bottom: 22px;
    letter-spacing: -0.02em;
  }
  .welcome-title em {
    font-style: italic;
    color: var(--muted);
  }
  .welcome-sub {
    font-size: clamp(14px, 2vw, 16px);
    line-height: 1.75;
    color: var(--muted);
    margin-bottom: 44px;
    max-width: 440px;
    font-weight: 300;
  }

  /* ── Question Meta ────────────────────────────── */
  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .q-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .q-sep {
    width: 1px;
    height: 10px;
    background: rgba(255,255,255,0.12);
    flex-shrink: 0;
  }
  .q-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Question Text ────────────────────────────── */
  .q-text {
    font-size: clamp(19px, 3.2vw, 29px);
    font-weight: 500;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: -0.02em;
  }
  .optional-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
    font-family: 'Inter', sans-serif;
    position: relative;
    top: -2px;
  }
  .q-sub {
    font-size: clamp(13px, 1.8vw, 14px);
    line-height: 1.65;
    color: var(--muted);
    margin-bottom: 28px;
    font-weight: 300;
  }

  /* ── Inputs ───────────────────────────────────── */
  .input-wrap { margin-bottom: 6px; }

  .f-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.12);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    /* 16px minimum prevents iOS zoom */
    font-size: clamp(16px, 2.5vw, 19px);
    font-weight: 300;
    padding: 10px 0 12px;
    outline: none;
    transition: border-color 0.25s;
    caret-color: var(--accent);
    letter-spacing: -0.01em;
    border-radius: 0;
    -webkit-appearance: none;
    appearance: none;
  }
  .f-input:focus { border-bottom-color: var(--accent); }
  .f-input::placeholder { color: rgba(237,234,227,0.18); }

  textarea.f-input {
    resize: none;
    min-height: 100px;
    line-height: 1.65;
    padding-top: 6px;
    overflow: hidden;
  }

  input[type="date"].f-input {
    color-scheme: dark;
    min-height: 44px;
  }

  /* ── Radio ────────────────────────────────────── */
  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 6px;
  }
  .radio-opt {
    display: flex;
    align-items: center;
    gap: 12px;
    /* 44px min touch target */
    padding: 13px 16px;
    min-height: 50px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .radio-opt:hover {
    border-color: var(--border-hover);
    background: var(--accent-glow);
  }
  .radio-opt.selected {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .radio-key {
    width: 24px;
    height: 24px;
    border: 1.5px solid rgba(255,255,255,0.14);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.18s;
    letter-spacing: 0.06em;
  }
  .radio-opt.selected .radio-key {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .radio-lbl {
    font-size: clamp(14px, 2vw, 15px);
    color: var(--text);
    font-weight: 400;
    line-height: 1.4;
  }

  /* ── Error ────────────────────────────────────── */
  .err-msg {
    font-size: 12px;
    color: var(--error);
    display: none;
    margin-top: 8px;
    font-weight: 400;
  }
  .err-msg.show { display: block; }

  /* ── Enter Hint ───────────────────────────────── */
  .enter-hint {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 16px;
    font-size: 12px;
    color: rgba(237,234,227,0.25);
  }
  .enter-hint kbd {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    color: rgba(237,234,227,0.35);
  }
  /* Hide keyboard hint on touch devices */
  @media (hover: none) and (pointer: coarse) {
    .enter-hint { display: none; }
  }

  /* ── Buttons ──────────────────────────────────── */
  .btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 26px;
    min-height: 48px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(45,108,223,0.32);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-skip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 18px;
    min-height: 48px;
    background: transparent;
    color: var(--muted);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-skip:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }

  /* ── Section Transition Card ──────────────────── */
  #section-card {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 400;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s cubic-bezier(0.4,0,0.2,1);
    padding: 20px;
    text-align: center;
  }
  #section-card.show {
    opacity: 1;
    pointer-events: all;
  }
  .sc-logo {
    margin-bottom: 40px;
    opacity: 0.4;
  }
  .sc-logo svg { width: 72px; height: auto; }
  .sc-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .sc-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(24px, 5vw, 50px);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
    max-width: 500px;
  }

  /* ── Thank You ────────────────────────────────── */
  .ty-check {
    width: 52px;
    height: 52px;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    font-size: 20px;
  }

  /* ── Confetti ─────────────────────────────────── */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }

  /* ── Sending / Loading State ─────────────────── */
  .sending-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 60vh;
    gap: 20px;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sending-label {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.06em;
    font-weight: 400;
  }

  /* ── Error Banner ─────────────────────────────── */
  .send-error {
    background: rgba(224,82,82,0.1);
    border: 1px solid rgba(224,82,82,0.3);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    color: #e05252;
    line-height: 1.6;
    margin-top: 8px;
  }

  /* ── Shake Animation ──────────────────────────── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.32s ease; }

  /* ── Responsive: Tablet (≤768px) ─────────────── */
  @media (max-width: 768px) {
    #fixed-logo svg { width: 68px; }
    .screen { padding: 72px 24px 32px; }
    .welcome-logo svg { width: 100px; }
    .welcome-title { font-size: clamp(34px, 8vw, 52px); }
    .radio-opt { padding: 12px 14px; }
  }

  /* ── Responsive: Mobile (≤480px) ─────────────── */
  @media (max-width: 480px) {
    #fixed-logo { top: 14px; }
    #fixed-logo svg { width: 58px; }
    #back-btn { top: 10px; left: 8px; font-size: 0; padding: 12px; }
    #back-btn svg { width: 16px; height: 16px; }
    #q-counter { top: 14px; right: 12px; font-size: 10px; line-height: 40px; }
    .screen { padding: 64px 18px 28px; justify-content: flex-start; padding-top: 72px; }
    .welcome-logo { margin-bottom: 36px; }
    .welcome-logo svg { width: 86px; }
    .welcome-sub { margin-bottom: 36px; }
    .btn-primary { width: 100%; justify-content: center; }
    .btn-skip { width: 100%; justify-content: center; }
    .btn-row { flex-direction: column; }
    .radio-group { gap: 7px; }
    .radio-opt { padding: 12px 12px; border-radius: 9px; }
    .q-meta { margin-bottom: 16px; }
  }

  /* ── Responsive: Tiny (≤360px) ───────────────── */
  @media (max-width: 360px) {
    .screen { padding: 60px 14px 24px; }
    .welcome-logo svg { width: 76px; }
    .radio-opt { padding: 11px 12px; }
    .f-input { font-size: 16px; }
  }

  /* ── Landscape phone ──────────────────────────── */
  @media (max-height: 500px) and (orientation: landscape) {
    .screen {
      justify-content: flex-start;
      padding-top: 60px;
    }
    .welcome-logo { margin-bottom: 20px; }
    .welcome-logo svg { width: 72px; }
    .welcome-title { font-size: 32px; margin-bottom: 12px; }
    .welcome-sub { margin-bottom: 24px; font-size: 13px; }
    .q-meta { margin-bottom: 12px; }
    textarea.f-input { min-height: 70px; }
  }
</style>
</head>
<body>

<div id="progress-track"><div id="progress-fill"></div></div>

<!-- Logo shown during question screens -->

<script>
// ─── Grab logo HTML from template ─────────────────────
const LOGO_HTML = document.getElementById('logo-svg-tpl').innerHTML;

// ──────────────────────────────────────────────────────
// EMAILJS CONFIG  ← replace these three values
// ──────────────────────────────────────────────────────
const EJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';   // Account → API Keys
const EJS_SERVICE_ID  = 'YOUR_SERVICE_ID';   // Email Services → Service ID
const EJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';  // Email Templates → Template ID

// ──────────────────────────────────────────────────────
// BUILD EMAIL BODY
// ──────────────────────────────────────────────────────
function buildEmailBody() {
  const SECTION_GROUPS = [
    { name: 'CLIENT & PROJECT BASICS',    ids: [1,2,3,4,5,6,7]        },
    { name: 'PROJECT OVERVIEW & GOALS',   ids: [8,9,10,11]             },
    { name: 'SCOPE & FEATURES',           ids: [12,13,14,15]           },
    { name: 'DESIGN & BRAND',             ids: [16,17,18,19,20,21]     },
    { name: 'DEVELOPMENT',                ids: [22,23,24,25,26,27,28]  },
    { name: 'PLATFORM PROJECTS ONLY',     ids: [29,30,31,32]           },
    { name: 'TIMELINE & BUDGET',          ids: [33,34,35,36]           },
  ];

  const qMap = {};
  QUESTIONS.forEach(q => { qMap[q.id] = q; });

  let body = `New client intake submission\nSubmitted: ${new Date().toLocaleString('en-US', { dateStyle:'long', timeStyle:'short' })}\n\n`;

  SECTION_GROUPS.forEach(sec => {
    body += `\n${'─'.repeat(42)}\n${sec.name}\n${'─'.repeat(42)}\n\n`;
    sec.ids.forEach(id => {
      const q   = qMap[id];
      const ans = answers[id];
      if (ans !== undefined && ans !== '') {
        body += `${q.q}\n${ans}\n\n`;
      } else {
        body += `${q.q}\n(not answered)\n\n`;
      }
    });
  });

  return body;
}

// ──────────────────────────────────────────────────────
// SEND EMAIL VIA EMAILJS
// ──────────────────────────────────────────────────────
async function sendEmail() {
  emailjs.init({ publicKey: EJS_PUBLIC_KEY });

  const companyName = answers[1] || 'New Client';

  return emailjs.send(EJS_SERVICE_ID, EJS_TEMPLATE_ID, {
    to_email:     'nss@rumoravenue.com',
    cc_email:     'serena@rumoravenue.com',
    subject:      `New intake — ${companyName}`,
    company_name: companyName,
    message:      buildEmailBody(),
    reply_to:     answers[3] || '',
  });
}

// ──────────────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────────────
const SECTIONS = [
  "Client & Project Basics",
  "Project Overview & Goals",
  "Scope & Features",
  "Design & Brand",
  "Development",
  "Platform Projects Only",
  "Timeline & Budget"
];

const QUESTIONS = [
  // 0 — Client & Project Basics
  { id:1,  sec:0, type:"text",     q:"What's your company name?",                          req:true  },
  { id:2,  sec:0, type:"text",     q:"Who's the primary contact on your team?",            req:true  },
  { id:3,  sec:0, type:"email",    q:"What's the best email to reach them?",               req:true  },
  { id:4,  sec:0, type:"text",     q:"What industry or sector are you in?",                req:true  },
  { id:5,  sec:0, type:"text",     q:"What do you want to call this project?",             req:true  },
  { id:6,  sec:0, type:"text",     q:"Who will be the day-to-day point of contact?",       req:true  },
  { id:7,  sec:0, type:"text",     q:"Who is the final decision maker on this project?",   req:false },
  // 1 — Project Overview & Goals
  { id:8,  sec:1, type:"textarea", q:"What are you building?",
    sub:"Give us a clear picture of what the end product should be.",                       req:true  },
  { id:9,  sec:1, type:"textarea", q:"What are your goals and intended outcomes?",
    sub:"What does success look like once this is live?",                                   req:true  },
  { id:10, sec:1, type:"textarea", q:"Who is your target audience?",                       req:true  },
  { id:11, sec:1, type:"textarea", q:"How will you measure success?",
    sub:"KPIs, metrics, conversion goals, etc.",                                            req:true  },
  // 2 — Scope & Features
  { id:12, sec:2, type:"radio",    q:"Is this a website or a platform?",
    opts:["Website","Platform","Both"],                                                     req:true  },
  { id:13, sec:2, type:"textarea", q:"What pages or features do you need?",
    sub:"List each section or feature you expect to be included.",                          req:true  },
  { id:14, sec:2, type:"textarea", q:"What are the absolute must-haves for launch?",       req:true  },
  { id:15, sec:2, type:"textarea", q:"What would be nice to have but isn't blocking?",     req:false },
  // 3 — Design & Brand
  { id:16, sec:3, type:"radio",    q:"Do you have a brand guide?",
    opts:["Yes — I'll upload it","No — we'll need brand development"],                     req:true  },
  { id:17, sec:3, type:"radio",    q:"Do you have logo files ready?",
    opts:["Yes — vector files ready","Partially — working on it","No — need logo design"], req:true  },
  { id:18, sec:3, type:"text",     q:"What fonts does your brand use?",
    sub:"If you have them, list them here.",                                                req:false },
  { id:19, sec:3, type:"text",     q:"What are your brand colors?",
    sub:"Hex codes or describe your palette.",                                              req:false },
  { id:20, sec:3, type:"textarea", q:"Any websites that inspire your vision?",
    sub:"Drop URLs and note what you like about each.",                                    req:false },
  { id:21, sec:3, type:"radio",    q:"Do you have existing content to carry over?",
    opts:["Yes","Some","No"],                                                               req:false },
  // 4 — Development
  { id:22, sec:4, type:"text",     q:"Do you have a CMS preference?",
    sub:"Webflow, WordPress, custom — or no preference.",                                   req:false },
  { id:23, sec:4, type:"textarea", q:"What third-party tools or integrations are needed?",
    sub:"e.g. CRM, payments, analytics, email marketing.",                                  req:false },
  { id:24, sec:4, type:"radio",    q:"Do you have access to your domain registrar?",
    opts:["Yes","No — needs setup"],                                                        req:true  },
  { id:25, sec:4, type:"radio",    q:"Do you have hosting access?",
    opts:["Yes","No — needs setup"],                                                        req:true  },
  { id:26, sec:4, type:"radio",    q:"Do you own and control the DNS?",
    opts:["Yes","No","Unsure"],                                                             req:true  },
  { id:27, sec:4, type:"text",     q:"Do you have existing analytics IDs to keep?",
    sub:"Google Analytics, GTM, Facebook Pixel, etc.",                                     req:false },
  { id:28, sec:4, type:"text",     q:"What is your current tech stack?",                   req:false },
  // 5 — Platform Projects Only
  { id:29, sec:5, type:"textarea", q:"What are your database or backend requirements?",
    sub:"Skip if this is a standard website.",                                              req:false },
  { id:30, sec:5, type:"radio",    q:"Do you need user authentication or login?",
    opts:["Yes","No","Maybe"],                                                              req:false },
  { id:31, sec:5, type:"textarea", q:"Are there any API requirements?",
    sub:"Internal or external APIs to build or connect.",                                   req:false },
  { id:32, sec:5, type:"textarea", q:"What does the admin dashboard need to do?",           req:false },
  // 6 — Timeline & Budget
  { id:33, sec:6, type:"text",     q:"Are there any hard deadlines we must know about?",
    sub:"Events, launches, contracts, etc.",                                                req:true  },
  { id:34, sec:6, type:"date",     q:"What is your target launch date?",                   req:true  },
  { id:35, sec:6, type:"radio",    q:"What is your budget range?",
    opts:["Under $5k","$5k–$15k","$15k–$30k","$30k–$60k","$60k+","Let's discuss"],        req:false },
  { id:36, sec:6, type:"radio",    q:"How would you like to approach delivery?",
    opts:["Full delivery at once","Phased rollout","Not sure yet"],                         req:true  },
];

// ──────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────
let stage   = 'welcome';
let qIndex  = 0;
let answers = {};
let busy    = false;

// ──────────────────────────────────────────────────────
// DOM
// ──────────────────────────────────────────────────────
const host      = document.getElementById('screen-host');
const pfill     = document.getElementById('progress-fill');
const backBtn   = document.getElementById('back-btn');
const counter   = document.getElementById('q-counter');
const secCard   = document.getElementById('section-card');
const scLabel   = document.getElementById('sc-label');
const scTitle   = document.getElementById('sc-title');
const fixedLogo = document.getElementById('fixed-logo');

// ──────────────────────────────────────────────────────
// SYNC UI
// ──────────────────────────────────────────────────────
function syncUI() {
  if (stage === 'welcome') {
    pfill.style.width = '0%';
    backBtn.style.display = 'none';
    counter.style.display = 'none';
    fixedLogo.classList.remove('visible');
  } else if (stage === 'thankyou') {
    pfill.style.width = '100%';
    backBtn.style.display = 'none';
    counter.style.display = 'none';
    fixedLogo.classList.add('visible');
  } else {
    pfill.style.width = `${((qIndex + 1) / QUESTIONS.length) * 100}%`;
    backBtn.style.display = 'flex';
    counter.style.display = 'block';
    counter.textContent = `${qIndex + 1} / ${QUESTIONS.length}`;
    fixedLogo.classList.add('visible');
  }
}

// ──────────────────────────────────────────────────────
// SCREEN TRANSITIONS
// ──────────────────────────────────────────────────────
function mountScreen(html, dir) {
  return new Promise(resolve => {
    const old = host.querySelector('.screen');
    const s   = document.createElement('div');
    s.className = 'screen';
    s.innerHTML  = `<div class="screen-inner">${html}</div>`;
    host.appendChild(s);

    if (!old || dir === 'instant') {
      if (old) old.remove();
      requestAnimationFrame(() => { s.classList.add('enter'); resolve(); });
      return;
    }

    old.classList.remove('enter');
    old.classList.add(dir === 'fwd' ? 'exit-up' : 'exit-down');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      s.classList.add('enter');
      resolve();
    }));
    setTimeout(() => old.remove(), 360);
  });
}

// ──────────────────────────────────────────────────────
// SECTION CARD
// ──────────────────────────────────────────────────────
function flashSection(idx) {
  return new Promise(resolve => {
    scLabel.textContent = `Section ${idx + 1} of ${SECTIONS.length}`;
    scTitle.textContent = SECTIONS[idx];
    secCard.classList.add('show');
    setTimeout(() => {
      secCard.classList.remove('show');
      setTimeout(resolve, 350);
    }, 950);
  });
}

// ──────────────────────────────────────────────────────
// RENDER HELPERS
// ──────────────────────────────────────────────────────
function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderWelcome() {
  return `
    <div class="welcome-logo">${LOGO_HTML}</div>
    <h1 class="welcome-title">Let's build<br><em>something great.</em></h1>
    <p class="welcome-sub">This intake form helps us understand your project before we get started. It takes about 5–10 minutes.</p>
    <div class="btn-row">
      <button class="btn-primary" onclick="startForm()">Start &nbsp;→</button>
    </div>`;
}

function renderQuestion(i) {
  const q   = QUESTIONS[i];
  const num = String(i + 1).padStart(2, '0');
  const val = answers[q.id] ?? '';

  let field = '';
  if (q.type === 'radio') {
    const KEYS = ['A','B','C','D','E','F'];
    field = `<div class="radio-group" id="rg-${q.id}">
      ${q.opts.map((opt, k) => `
        <div class="radio-opt${val === opt ? ' selected' : ''}" data-qid="${q.id}" data-val="${esc(opt)}">
          <div class="radio-key">${KEYS[k]}</div>
          <div class="radio-lbl">${esc(opt)}</div>
        </div>`).join('')}
    </div>`;
  } else if (q.type === 'textarea') {
    field = `<div class="input-wrap">
      <textarea class="f-input" id="fi-${q.id}" placeholder="Escribe tu respuesta aquí…">${esc(val)}</textarea>
    </div>`;
  } else {
    field = `<div class="input-wrap">
      <input type="${q.type}" class="f-input" id="fi-${q.id}"
        placeholder="Escribe tu respuesta aquí…"
        value="${esc(val)}" autocomplete="off" spellcheck="false">
    </div>`;
  }

  const optTag  = q.req ? '' : '<span class="optional-tag">Opcional</span>';
  const subLine = q.sub ? `<p class="q-sub">${esc(q.sub)}</p>` : '';
  const hint    = q.type !== 'radio'
    ? `<div class="enter-hint"><kbd>Enter ↵</kbd> para continuar</div>` : '';
  const skipBtn = !q.req
    ? `<button class="btn-skip" onclick="skipQ()">Omitir</button>` : '';

  return `
    <div class="q-meta">
      <span class="q-num">${num}</span>
      <span class="q-sep"></span>
      <span class="q-section-label">${esc(SECTIONS[q.sec])}</span>
    </div>
    <h2 class="q-text">${esc(q.q)}${optTag}</h2>
    ${subLine}
    ${field}
    <div class="err-msg" id="em-${q.id}">Este campo es obligatorio.</div>
    ${hint}
    <div class="btn-row">
      <button class="btn-primary" onclick="advance()">OK &nbsp;✓</button>
      ${skipBtn}
    </div>`;
}

function renderThankyou() {
  return `
    <div class="ty-check">✓</div>
    <div class="welcome-logo" style="margin-bottom:28px">${LOGO_HTML}</div>
    <h1 class="welcome-title" style="font-size:clamp(32px,6vw,58px)">You're all set.</h1>
    <p class="welcome-sub">Your intake has been submitted. Navroop will be in touch within 2 business days.</p>`;
}

async function showThankyou() {
  await mountScreen(renderThankyou(), 'instant');
  confetti();
}

// ──────────────────────────────────────────────────────
// AUTO-RESIZE TEXTAREA
// ──────────────────────────────────────────────────────
function wireTextarea(id) {
  const el = document.getElementById(`fi-${id}`);
  if (!el || el.tagName !== 'TEXTAREA') return;
  const resize = () => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };
  el.addEventListener('input', resize);
  resize();
}

// ──────────────────────────────────────────────────────
// RADIO DELEGATION
// ──────────────────────────────────────────────────────
host.addEventListener('click', e => {
  const opt = e.target.closest('.radio-opt');
  if (!opt) return;
  const qid = parseInt(opt.dataset.qid, 10);
  const val = opt.dataset.val;
  answers[qid] = val;
  const grp = document.getElementById(`rg-${qid}`);
  if (grp) grp.querySelectorAll('.radio-opt').forEach(o => o.classList.remove('selected'));
  opt.classList.add('selected');
  const em = document.getElementById(`em-${qid}`);
  if (em) em.classList.remove('show');
  setTimeout(() => goNext(), 380);
});

// ──────────────────────────────────────────────────────
// FOCUS
// ──────────────────────────────────────────────────────
function focusCurrent() {
  setTimeout(() => {
    const q = QUESTIONS[qIndex];
    if (!q) return;
    const el = document.getElementById(`fi-${q.id}`);
    if (el) el.focus();
  }, 60);
}

// ──────────────────────────────────────────────────────
// VALIDATE
// ──────────────────────────────────────────────────────
function saveAndValidate() {
  const q = QUESTIONS[qIndex];
  if (q.type === 'radio') {
    if (q.req && answers[q.id] === undefined) {
      const em = document.getElementById(`em-${q.id}`);
      if (em) em.classList.add('show');
      return false;
    }
    return true;
  }
  const el  = document.getElementById(`fi-${q.id}`);
  const val = el ? el.value.trim() : '';
  if (q.req && !val) {
    const em = document.getElementById(`em-${q.id}`);
    if (em) em.classList.add('show');
    el && el.classList.add('shake');
    el && el.addEventListener('animationend', () => el.classList.remove('shake'), { once:true });
    el && el.focus();
    return false;
  }
  answers[q.id] = val;
  return true;
}

// ──────────────────────────────────────────────────────
// NAVIGATION
// ──────────────────────────────────────────────────────
async function startForm() {
  if (busy) return;
  busy = true;
  stage  = 'question';
  qIndex = 0;
  syncUI();
  await flashSection(0);
  await mountScreen(renderQuestion(0), 'fwd');
  wireTextarea(QUESTIONS[0].id);
  focusCurrent();
  busy = false;
}

function advance() {
  if (busy) return;
  if (!saveAndValidate()) return;
  goNext();
}

function skipQ() {
  if (busy) return;
  goNext();
}

async function goNext() {
  if (busy) return;
  busy = true;
  const next = qIndex + 1;

  if (next >= QUESTIONS.length) {
    // Show sending state
    stage = 'thankyou';
    syncUI();
    await mountScreen(`<div class="sending-screen"><div class="spinner"></div><div class="sending-label">Submitting your intake…</div></div>`, 'fwd');

    console.log('%c📋 Rumor — Client Intake Submission', 'font-weight:700;font-size:14px;color:#2D6CDF');
    console.log(JSON.stringify(answers, null, 2));

    try {
      await sendEmail();
    } catch (err) {
      console.error('EmailJS error:', err);
      // Show error state with option to continue anyway
      await mountScreen(`
        <div class="sending-screen">
          <div class="welcome-logo" style="margin-bottom:24px">${LOGO_HTML}</div>
          <div class="send-error">
            Could not send the email automatically.<br>
            Please forward your answers to <strong>nss@rumoravenue.com</strong>
          </div>
          <div class="btn-row" style="justify-content:center;margin-top:8px">
            <button class="btn-primary" onclick="showThankyou()">Continue</button>
          </div>
        </div>`, 'instant');
      busy = false;
      return;
    }

    await showThankyou();
    busy = false;
    return;
  }

  const fromSec = QUESTIONS[qIndex].sec;
  const toSec   = QUESTIONS[next].sec;
  qIndex = next;
  syncUI();

  if (toSec !== fromSec) await flashSection(toSec);

  await mountScreen(renderQuestion(qIndex), 'fwd');
  wireTextarea(QUESTIONS[qIndex].id);
  focusCurrent();
  busy = false;
}

async function goBack() {
  if (busy) return;

  if (stage === 'question' && qIndex === 0) {
    busy = true;
    stage = 'welcome';
    syncUI();
    await mountScreen(renderWelcome(), 'back');
    busy = false;
    return;
  }

  if (stage === 'question' && qIndex > 0) {
    busy = true;
    qIndex--;
    syncUI();
    await mountScreen(renderQuestion(qIndex), 'back');
    wireTextarea(QUESTIONS[qIndex].id);
    focusCurrent();
    busy = false;
  }
}

// ──────────────────────────────────────────────────────
// KEYBOARD
// ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (stage === 'welcome') { if (e.key === 'Enter') startForm(); return; }
  if (stage === 'thankyou') return;

  const q = QUESTIONS[qIndex];

  if (e.key === 'Escape') { goBack(); return; }

  if (q.type === 'radio') {
    const map = { a:0, b:1, c:2, d:3, e:4, f:5 };
    const k   = e.key.toLowerCase();
    if (k in map && map[k] < q.opts.length) {
      if (busy) return;
      const idx = map[k];
      answers[q.id] = q.opts[idx];
      const grp = document.getElementById(`rg-${q.id}`);
      if (grp) grp.querySelectorAll('.radio-opt').forEach((o,i) => o.classList.toggle('selected', i === idx));
      setTimeout(() => goNext(), 340);
    }
    return;
  }

  if (e.key === 'Enter') {
    if (q.type === 'textarea' && !e.shiftKey) { e.preventDefault(); advance(); }
    else if (q.type !== 'textarea') { e.preventDefault(); advance(); }
  }
});

// ──────────────────────────────────────────────────────
// CONFETTI
// ──────────────────────────────────────────────────────
function confetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#2D6CDF','#4ade80','#edeae3','#fbbf24','#f87171','#a78bfa','#38bdf8'];
  const pts = Array.from({ length: 90 }, () => ({
    x:  Math.random() * canvas.width,
    y:  -14,
    vx: (Math.random() - 0.5) * 3.5,
    vy: Math.random() * 3.5 + 1.8,
    w:  Math.random() * 7 + 3,
    h:  Math.random() * 4 + 2,
    r:  Math.random() * 360,
    rv: (Math.random() - 0.5) * 7,
    c:  COLORS[Math.floor(Math.random() * COLORS.length)],
    a:  1,
  }));

  let f = 0;
  const loop = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    f++;
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.07; p.r += p.rv;
      p.a = Math.max(0, 1 - f / 180);
      ctx.save();
      ctx.globalAlpha = p.a;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.r * Math.PI / 180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (f < 180) requestAnimationFrame(loop);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  };
  loop();
}

// ──────────────────────────────────────────────────────
// BOOT
// ──────────────────────────────────────────────────────
mountScreen(renderWelcome(), 'instant');
syncUI();
</script>
</body>
</html>
